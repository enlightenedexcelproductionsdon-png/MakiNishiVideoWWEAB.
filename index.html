<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Shader & Pitch Editor</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #container { position: relative; width: 640px; }
        canvas { width: 100%; border: 2px solid #444; }
        .controls { background: #333; padding: 20px; border-radius: 8px; margin-top: 10px; display: grid; gap: 10px; width: 600px; }
        .control-group { display: flex; justify-content: space-between; align-items: center; }
        video { display: none; } /* We draw the video to canvas instead */
    </style>
</head>
<body>

    <h2>Video Processor</h2>
    
    <div id="container">
        <canvas id="outputCanvas"></canvas>
    </div>

    <div class="controls">
        <input type="file" id="upload" accept="video/*">
        
        <div class="control-group">
            <label>Hue Rotate</label>
            <input type="range" id="hueSlider" min="0" max="6.28" step="0.1" value="0">
        </div>

        <div class="control-group">
            <label>Wave Warp (Intensity)</label>
            <input type="range" id="waveSlider" min="0" max="0.1" step="0.001" value="0">
        </div>

        <div class="control-group">
            <label>Audio Pitch</label>
            <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <button id="exportBtn">Export Video (Console Log)</button>
    </div>

    <video id="inputVideo" loop crossorigin="anonymous"></video>
